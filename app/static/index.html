<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Tender Smart Search</title>
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body>
    <div class="app-layout">
      <aside class="sidebar" aria-label="Разделы платформы">
        <div class="sidebar-brand">
          <span class="brand-mark">T</span>
          <div>
            <strong>Tender AI</strong>
            <small>Поиск и аналитика</small>
          </div>
        </div>

        <nav class="sidebar-nav">
          <a class="nav-item" href="#market">
            <span class="nav-icon">⌂</span>
            <span>Обзор рынка</span>
          </a>
          <a class="nav-item active" href="#goszakup">
            <span class="nav-icon">◒</span>
            <span>Лоты Госзакуп</span>
          </a>
          <a class="nav-item muted-link" href="#samruk">
            <span class="nav-icon">◇</span>
            <span>Лоты Самрук</span>
            <em>скоро</em>
          </a>
          <a class="nav-item muted-link" href="#customer">
            <span class="nav-icon">◎</span>
            <span>Анализ заказчика</span>
            <em>скоро</em>
          </a>
          <a class="nav-item muted-link" href="#regions">
            <span class="nav-icon">⌖</span>
            <span>Регионы</span>
            <em>скоро</em>
          </a>
          <a class="nav-item muted-link" href="#saved">
            <span class="nav-icon">▱</span>
            <span>Мои лоты</span>
            <em>скоро</em>
          </a>
          <a class="nav-item muted-link" href="#assistant">
            <span class="nav-icon">✦</span>
            <span>AI-ассистент</span>
            <em>скоро</em>
          </a>
        </nav>
      </aside>

      <main class="shell">
        <section id="goszakup" class="search-panel">
          <div class="brand">
            <span>Goszakup Smart Search</span>
            <h1>Умный поиск товаров на госзакупках</h1>
          </div>

          <form id="searchForm" class="search-form">
            <label class="query-field">
              <span>Что ищем</span>
              <input id="queryInput" type="search" placeholder="например: сервер для больницы, лицензия 1С, ноутбук i7">
            </label>
            <div class="controls">
              <label>
                <span>Мин. сумма</span>
                <input id="amountInput" type="number" min="0" step="100000" value="0">
              </label>
              <label>
                <span>Статус</span>
                <select id="statusInput">
                  <option value="accepting">Только прием заявок</option>
                  <option value="published">Опубликованные</option>
                  <option value="all">Все статусы</option>
                </select>
              </label>
              <label>
                <span>Лимит</span>
                <input id="limitInput" type="number" min="1" max="50" step="1" value="30">
              </label>
              <button type="submit">Искать</button>
            </div>
            <label>
              <span>Исключить слова</span>
              <input id="excludeInput" type="text" placeholder="например: vps, аренда, хостинг">
            </label>
          </form>
        </section>

        <section class="insights">
          <div>
            <b id="resultCount">0</b>
            <span>найдено</span>
          </div>
          <div>
            <b id="termsLabel">—</b>
            <span>ключи</span>
          </div>
        </section>

        <section id="phraseBox" class="phrases"></section>
        <section id="results" class="results"></section>
      </main>
    </div>

    <script src="/static/app.js"></script>
  </body>
</html>
